<!DOCTYPE html>
<html>
<head>
    <title>MCP Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #log { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; margin-top: 10px; }
        button { margin: 5px; padding: 8px 15px; }
    </style>
</head>
<body>
    <h1>MCP Connection Test</h1>
    
    <button id="connectBtn">Connect to MCP</button>
    <button id="disconnectBtn" disabled>Disconnect</button>
    <button id="testIntrospectBtn" disabled>Test Introspect</button>
    <button id="testGetProjectsBtn" disabled>Test Get Projects</button>
    
    <div id="log"></div>

    <script>
        const logElement = document.getElementById('log');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const testIntrospectBtn = document.getElementById('testIntrospectBtn');
        const testGetProjectsBtn = document.getElementById('testGetProjectsBtn');
        
        let eventSource = null;
        
        function log(message) {
            logElement.innerHTML += `<div>${new Date().toISOString()}: ${message}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        connectBtn.addEventListener('click', () => {
            log('Connecting to MCP endpoint...');
            
            eventSource = new EventSource('https://scorecard-mcp.dare-d5b.workers.dev/mcp');
            
            eventSource.onopen = () => {
                log('Connection opened');
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                testIntrospectBtn.disabled = false;
                testGetProjectsBtn.disabled = false;
            };
            
            eventSource.onerror = (error) => {
                log(`Connection error: ${JSON.stringify(error)}`);
                eventSource.close();
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                testIntrospectBtn.disabled = true;
                testGetProjectsBtn.disabled = true;
            };
            
            eventSource.onmessage = (event) => {
                log(`Received message: ${event.data}`);
            };
            
            // Listen for specific event types
            eventSource.addEventListener('ready', (event) => {
                log(`Ready event: ${event.data}`);
            });
            
            eventSource.addEventListener('authentication', (event) => {
                log(`Authentication event: ${event.data}`);
            });
            
            eventSource.addEventListener('tools', (event) => {
                log(`Tools event: ${event.data}`);
            });
        });
        
        disconnectBtn.addEventListener('click', () => {
            if (eventSource) {
                eventSource.close();
                log('Connection closed');
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                testIntrospectBtn.disabled = true;
                testGetProjectsBtn.disabled = true;
            }
        });
        
        testIntrospectBtn.addEventListener('click', async () => {
            log('Sending introspect request...');
            
            try {
                const response = await fetch('https://scorecard-mcp.dare-d5b.workers.dev/mcp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        version: "v1",
                        capabilities: [],
                        request: {
                            type: "introspect"
                        }
                    })
                });
                
                const data = await response.json();
                log(`Introspect response: ${JSON.stringify(data)}`);
            } catch (error) {
                log(`Error with introspect: ${error.message}`);
            }
        });
        
        testGetProjectsBtn.addEventListener('click', async () => {
            log('Sending get_projects request...');
            
            try {
                const response = await fetch('https://scorecard-mcp.dare-d5b.workers.dev/mcp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        version: "v1",
                        capabilities: [],
                        request: {
                            type: "invoke",
                            invoke: {
                                tool: "get_projects",
                                parameters: {}
                            }
                        }
                    })
                });
                
                const data = await response.json();
                log(`get_projects response: ${JSON.stringify(data)}`);
            } catch (error) {
                log(`Error with get_projects: ${error.message}`);
            }
        });
    </script>
</body>
</html>
