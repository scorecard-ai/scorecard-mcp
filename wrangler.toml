name = "scorecard-mcp"
main = "src/index.ts"
compatibility_date = "2024-05-01"

# This will deploy to workers.dev by default
# We can add custom domains later if needed

# Environment variables
# These will need to be set using wrangler secret commands
[vars]
# Define any non-secret variables here

# Define what secrets this worker needs access to
# These need to be set with: npx wrangler secret put SECRET_NAME
[[env.production]]
name = "production"
[env.production.vars]

# Secret variables that must be set in production:
# CLERK_SECRET_KEY - Secret key for Clerk integration
# CLERK_PUBLISHABLE_KEY - Publishable key for Clerk
# CLERK_OAUTH_CLIENT_ID - Clerk OAuth client ID
# CLERK_OAUTH_CLIENT_SECRET - Clerk OAuth client secret